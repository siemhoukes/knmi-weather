name: Deploy dashboard

on:
  push:
    branches: [main]
  schedule:
    # Refresh KNMI data daily at 06:30 UTC (KNMI publishes new daily data in the morning)
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Build station data
        run: python scripts/build_data.py dashboard/data

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - id: deployment
        uses: actions/deploy-pages@v4
