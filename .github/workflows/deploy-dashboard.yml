name: Deploy dashboard

on:
  push:
    branches: [main]
  schedule:
    # Refresh KNMI data daily at 06:30 UTC (KNMI publishes new daily data in the morning)
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Build station data
        run: python scripts/build_data.py dashboard/data

      # Branch-based Pages publishing: pushing gh-pages enables Pages and the
      # CNAME file in dashboard/ configures the weather.siem.codes domain.
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dashboard
          force_orphan: true
